<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>German ASR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme bg-black">

  <nav class="navbar navbar-dark bg-black shadow-sm" style="border-bottom: 1px solid #ff0000;">
    <div class="container-fluid">
      <a class="navbar-brand gothic-title" href="/">German ASR</a>
      <ul class="navbar-nav ms-auto flex-row gap-3">
        <li class="nav-item"><a class="nav-link text-danger" href="/">Home</a></li>
      </ul>
    </div>
  </nav>

  <header class="text-center py-5">
    <h1 class="gothic-title">German Speech Recognition</h1>
    <p class="text-light">Convert German Speech to Text & Translate Instantly</p>
  </header>

  <div class="container">

    <div class="card mb-4 p-4 text-center">
      <h5 style="color: #ffce00;">Upload Audio File</h5>
      <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="audio" accept="audio/wav, audio/mp3" class="form-control bg-black text-light border-danger mb-3" required>
        <button type="submit" class="btn btn-danger w-100">UPLOAD & TRANSCRIBE</button>
      </form>
    </div>

    <div class="card mb-4 p-4 text-center">
      <h5 style="color: #ffce00;">Live Recording</h5>
      <div class="d-flex gap-2 justify-content-center mt-3">
        <button id="recordBtn" class="btn btn-danger flex-fill">START RECORDING</button>
        <button id="stopBtn" class="btn btn-outline-light flex-fill" disabled>STOP RECORDING</button>
      </div>

      <div id="audioWave" class="wave-container">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>

  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];

    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const audioWave = document.getElementById("audioWave");

    recordBtn.addEventListener("click", async () => {
      // Request mic access
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.start();
      audioChunks = [];

      // Show wave animation & update buttons
      audioWave.style.display = "flex"; 
      recordBtn.disabled = true;
      stopBtn.disabled = false;
      recordBtn.innerText = "RECORDING...";

      mediaRecorder.addEventListener("dataavailable", event => {
        audioChunks.push(event.data);
      });

      mediaRecorder.addEventListener("stop", () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        const formData = new FormData();
        formData.append("audio", audioBlob, "recorded.wav");

        // Show a loading message while Whisper processes the audio
        document.body.innerHTML = '<h3 class="text-center mt-5" style="color: #ffce00;">Transcribing Audio... Please wait.</h3>';

        fetch("/upload", {
          method: "POST",
          body: formData
        }).then(response => response.text())
          .then(html => {
              // Load the result.html page
              document.open();
              document.write(html);
              document.close();
          });
      });
    });

    stopBtn.addEventListener("click", () => {
      mediaRecorder.stop();
      audioWave.style.display = "none"; // Hide the wave
      recordBtn.disabled = false;
      stopBtn.disabled = true;
    });
  </script>

</body>
</html>
